                        g.label = '📁 ' + cat.name;
                        cat.feeds.forEach(f => {
                            const o = document.createElement('option');
                            o.value = JSON.stringify({id: f.id, name: f.title});
                            o.textContent = f.title + ' (' + (f.articles?.length||0) + ')';
                            g.appendChild(o);
                        });
                        sel.appendChild(g);
                    });
                }
                const mg = document.createElement('optgroup'); mg.label = '✏ Manual';
                const mo = document.createElement('option'); mo.value='__manual__'; mo.textContent='Introducir ID manualmente';
                mg.appendChild(mo); sel.appendChild(mg);

                // Populate Wallabag tags
                const tagSel = document.getElementById('wbTagSelect');
                tagSel.innerHTML = '';
                const allTags = new Set();
                articlesData?.wallabag?.articles?.forEach(a => (a.tags||[]).forEach(t => allTags.add(t)));
                [...allTags].sort().forEach(t => {
                    const o = document.createElement('option'); o.value = t; o.textContent = t;
                    tagSel.appendChild(o);
                });

                document.getElementById('feedPicker').classList.add('open');
            }

            function onPickerTypeChange() {
                const type = document.querySelector('input[name="feedType"]:checked')?.value;
                document.getElementById('picker-freshrss').style.display  = type==='freshrss'      ? '' : 'none';
                document.getElementById('picker-wb-tag').style.display    = type==='wallabag_tag'  ? '' : 'none';
                document.getElementById('picker-wb-words').style.display  = type==='wallabag_words'? '' : 'none';
            }

            function confirmAddFeed() {
                const type = document.querySelector('input[name="feedType"]:checked')?.value;
                const name = document.getElementById('pickerName').value.trim();
                const voice = document.getElementById('pickerVoice').value;
                const limit = +document.getElementById('pickerLimit').value || 10;
                let feed;

                if (type === 'freshrss') {
                    const val = document.getElementById('feedPickerSelect').value;
                    if (!val) return;
                    if (val === '__manual__') {
                        feed = {source:'freshrss', id:'feed/', name: name||'Nuevo feed', voice, include_youtube:false, limit};
                    } else {
                        const p = JSON.parse(val);
                        feed = {source:'freshrss', id:p.id, name: name||p.name, voice, include_youtube:false, limit};
                    }
                } else if (type === 'wallabag_tag') {
                    const tags = [...document.getElementById('wbTagSelect').selectedOptions].map(o=>o.value);
                    feed = {source:'wallabag', filter:'tag', tags, name: name||(tags.join(', ')||'Wallabag tags'), voice, limit};
                } else {
                    const min = +document.getElementById('wbMinWords').value || 500;
                    feed = {source:'wallabag', filter:'words', min_words:min, name: name||`>${min} palabras`, voice, limit};
                }

                currentFeeds.push(feed);
                renderFeedsTable(currentFeeds);
                closeFeedPicker();
            }

            function closeFeedPicker() { document.getElementById('feedPicker').classList.remove('open'); }

            function getConfigFromForm() {
                const wbFeeds = currentFeeds.filter(f => f.source === 'wallabag');
                const frFeeds = currentFeeds.filter(f => f.source !== 'wallabag').map(({source,...f})=>f);
                return {
                    wallabag: {
                        url:           document.getElementById('cfg-wb-url').value.trim(),
                        client_id:     document.getElementById('cfg-wb-clientid').value.trim(),
                        client_secret: document.getElementById('cfg-wb-secret').value.trim(),
                        username:      document.getElementById('cfg-wb-user').value.trim(),
                        password:      document.getElementById('cfg-wb-pass').value,
                        limit:         +document.getElementById('cfg-wb-limit').value,
                        feeds:         wbFeeds.map(({source,...f})=>f),
                    },
                    freshrss: {
                        url:         document.getElementById('cfg-fr-url').value.trim(),
                        username:    document.getElementById('cfg-fr-user').value.trim(),
                        password:    document.getElementById('cfg-fr-pass').value,
                        limit:       +document.getElementById('cfg-fr-limit').value,
                        unread_only: document.getElementById('cfg-fr-unread').checked,
                        feeds:       frFeeds,
                    }
                };
            }

            async function saveConfig() {
                const status = document.getElementById('cfg-status');
                status.textContent = 'Guardando…';
                status.className = 'config-status';
                try {
                    const r = await fetch('/api/config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(getConfigFromForm())
                    });
                    const data = await r.json();
                    if (data.success) {
                        status.textContent = '✓ ' + data.message;
                        status.className = 'config-status ok';
                    } else {
                        status.textContent = '✗ ' + data.error;
                        status.className = 'config-status err';
                    }
                } catch(e) {
                    status.textContent = '✗ Error de conexión';
                    status.className = 'config-status err';
                }
            }

            function renderConfig(cfg) {
                const wb = cfg.wallabag || {};
                document.getElementById('cfg-wb-url').value      = wb.url || '';
                document.getElementById('cfg-wb-clientid').value = wb.client_id || '';
                document.getElementById('cfg-wb-secret').value   = wb.client_secret || '';
                document.getElementById('cfg-wb-user').value     = wb.username || '';
                document.getElementById('cfg-wb-pass').value     = wb.password || '';
                document.getElementById('cfg-wb-limit').value    = wb.limit ?? 10;
                const fr = cfg.freshrss || {};
                document.getElementById('cfg-fr-url').value     = fr.url || '';
                document.getElementById('cfg-fr-user').value    = fr.username || '';
                document.getElementById('cfg-fr-pass').value    = fr.password || '';
                document.getElementById('cfg-fr-limit').value   = fr.limit ?? 10;
                document.getElementById('cfg-fr-unread').checked = !!fr.unread_only;

                // Merge freshrss.feeds + wallabag.feeds into currentFeeds with source tag
                const frFeeds = (fr.feeds || []).map(f => ({source:'freshrss', ...f}));
                const wbFeeds = (wb.feeds || []).map(f => ({source:'wallabag', ...f}));
                currentFeeds = JSON.parse(JSON.stringify([...frFeeds, ...wbFeeds]));
                renderFeedsTable(currentFeeds);
            }

            // Cargar datos al inicio
            loadData();
        </script>
